
<div style="padding: 1rem 0;">
  <h2 class="sr-only">sin x의 테일러 급수 근사 시각화 — 슬라이더로 항의 개수를 조절하세요</h2>

  <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem;">
    <label for="terms" style="font-size: 14px; color: var(--color-text-secondary); white-space: nowrap;">항의 개수</label>
    <input type="range" id="terms" min="1" max="8" value="1" step="1" style="flex: 1;" />
    <span id="terms-out" style="font-size: 14px; font-weight: 500; min-width: 20px;">1</span>
  </div>

  <div id="formula" style="font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1rem; min-height: 24px; font-family: var(--font-mono);"></div>

  <div style="position: relative; width: 100%; height: 320px;">
    <canvas id="taylorChart" role="img" aria-label="sin x와 테일러 급수 근사 그래프 비교"></canvas>
  </div>

  <div style="display: flex; gap: 20px; margin-top: 12px; font-size: 13px; color: var(--color-text-secondary);">
    <span style="display: flex; align-items: center; gap: 6px;">
      <span style="width: 24px; height: 3px; background: #378ADD; display: inline-block; border-radius: 2px;"></span>sin x (실제)
    </span>
    <span style="display: flex; align-items: center; gap: 6px;">
      <span style="width: 24px; height: 3px; background: #D85A30; display: inline-block; border-radius: 2px; border-top: 2px dashed #D85A30; height: 0;"></span>테일러 근사
    </span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
function factorial(n) {
  let r = 1;
  for (let i = 2; i <= n; i++) r *= i;
  return r;
}

function taylorSin(x, terms) {
  let sum = 0;
  for (let n = 0; n < terms; n++) {
    sum += Math.pow(-1, n) * Math.pow(x, 2 * n + 1) / factorial(2 * n + 1);
  }
  return sum;
}

function clamp(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

const formulaTerms = [
  'x',
  'x − x³/3!',
  'x − x³/3! + x⁵/5!',
  'x − x³/3! + x⁵/5! − x⁷/7!',
  'x − x³/3! + x⁵/5! − x⁷/7! + x⁹/9!',
  'x − ⋯ + x¹¹/11!',
  'x − ⋯ − x¹³/13!',
  'x − ⋯ + x¹⁵/15!',
];

const N = 200;
const xMin = -3 * Math.PI;
const xMax = 3 * Math.PI;
const xs = Array.from({ length: N }, (_, i) => xMin + (xMax - xMin) * i / (N - 1));

const labels = xs.map(x => x.toFixed(2));
const sinData = xs.map(x => ({ x, y: Math.sin(x) }));

const ctx = document.getElementById('taylorChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    datasets: [
      {
        label: 'sin x',
        data: sinData,
        borderColor: '#378ADD',
        borderWidth: 2,
        pointRadius: 0,
        tension: 0.4,
      },
      {
        label: '테일러 근사',
        data: sinData.map(p => ({ x: p.x, y: 0 })),
        borderColor: '#D85A30',
        borderWidth: 2,
        borderDash: [6, 3],
        pointRadius: 0,
        tension: 0.4,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 300 },
    plugins: {
      legend: { display: false },
      tooltip: { enabled: false }
    },
    scales: {
      x: {
        type: 'linear',
        min: xMin,
        max: xMax,
        ticks: {
          stepSize: Math.PI,
          callback: v => {
            const pi = Math.PI;
            const map = { [0]: '0', [pi.toFixed(4)]: 'π', [(-pi).toFixed(4)]: '-π', [(2*pi).toFixed(4)]: '2π', [(-2*pi).toFixed(4)]: '-2π', [(3*pi).toFixed(4)]: '3π', [(-3*pi).toFixed(4)]: '-3π' };
            return map[v.toFixed(4)] ?? '';
          },
          color: '#888780'
        },
        grid: { color: 'rgba(136,135,128,0.15)' }
      },
      y: {
        min: -3,
        max: 3,
        ticks: { color: '#888780' },
        grid: { color: 'rgba(136,135,128,0.15)' }
      }
    }
  }
});

function update(terms) {
  const approxData = xs.map(x => ({ x, y: clamp(taylorSin(x, terms), -3, 3) }));
  chart.data.datasets[1].data = approxData;
  chart.update();
  document.getElementById('formula').textContent = 'P(x) = ' + (formulaTerms[terms - 1] || '');
}

const slider = document.getElementById('terms');
const out = document.getElementById('terms-out');
slider.addEventListener('input', () => {
  const v = parseInt(slider.value);
  out.textContent = v;
  update(v);
});

update(1);
</script>
